name: Build & Release (Tauri)

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            rust_target: aarch64-apple-darwin
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
            rust_target: x86_64-apple-darwin
          - platform: windows-latest
            args: ''
            rust_target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './apps/cc-island/src-tauri -> target'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm --filter @ccisland/desktop build:renderer

      - name: Sync version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          npm pkg set version="$VERSION"
          cd apps/cc-island
          npm pkg set version="$VERSION"
          cd src-tauri
          sed -i.bak "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" tauri.conf.json

      - name: Build Tauri app
        shell: bash
        run: |
          cd apps/cc-island
          pnpm tauri build ${{ matrix.args }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-${{ matrix.rust_target }}
          path: |
            apps/cc-island/src-tauri/target/${{ matrix.rust_target }}/release/bundle/**/*
            apps/cc-island/src-tauri/target/release/bundle/**/*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | head -50

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          # Collect release assets
          FILES=()
          for f in $(find artifacts -type f \( -name '*.dmg' -o -name '*.app.tar.gz' -o -name '*-setup.exe' \)); do
            FILES+=("$f")
          done
          if [ ${#FILES[@]} -eq 0 ]; then
            echo "::error::No release assets found"
            exit 1
          fi
          echo "Uploading ${#FILES[@]} assets for ${TAG}"
          gh release create "${TAG}" "${FILES[@]}" \
            --draft \
            --title "CCIsland ${TAG}" \
            --notes "See the assets to download and install this version." \
            --repo "${{ github.repository }}"
